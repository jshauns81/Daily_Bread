# Staging stack - isolated copy of the app for hot-testing UI/layout changes
# before they go to the real dailybread-app / dailybread-postgres containers.
#
# Fully separate network, ports, and Postgres volume from prod - safe to start,
# stop, or wipe without touching real family data.
#
# Start:  docker compose -f docker-compose.staging.yml up -d --build
# Seed:   scripts/seed-staging.sh   (creates Parent test login + sample chores)
# Stop:   docker compose -f docker-compose.staging.yml down       (keeps data)
# Wipe:   docker compose -f docker-compose.staging.yml down -v    (drops data)
# Logs:   docker compose -f docker-compose.staging.yml logs -f
#
# Login (after seeding): username "admin" / password "StagingAdmin123!"
#
# Explicit project name below keeps this fully separate from the prod compose
# project (same directory => same default project name => `down --remove-orphans`
# on one file could otherwise see the other stack's containers as orphans).
name: dailybread-staging

services:
  dailybread-staging:
    build: .
    container_name: dailybread-app-staging
    restart: unless-stopped
    ports:
      - "15000:5000"
    environment:
      - DATABASE_URL=Host=dailybread-postgres-staging;Port=5432;Database=dailybread;Username=dailybread;Password=${STAGING_POSTGRES_PASSWORD:-StagingPass123!}
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
      - PORT=5000
      - Seed__AdminUserName=admin
      - Seed__AdminPassword=${STAGING_ADMIN_PASSWORD:-StagingAdmin123!}
    depends_on:
      dailybread-postgres-staging:
        condition: service_healthy
    networks:
      - dailybread-staging-net

  dailybread-postgres-staging:
    image: postgres:16-alpine
    container_name: dailybread-postgres-staging
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dailybread
      - POSTGRES_PASSWORD=${STAGING_POSTGRES_PASSWORD:-StagingPass123!}
      - POSTGRES_DB=dailybread
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailybread -d dailybread"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dailybread-staging-net

networks:
  dailybread-staging-net:
    driver: bridge

volumes:
  postgres-staging-data:
