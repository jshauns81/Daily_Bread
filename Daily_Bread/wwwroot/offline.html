<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0A14" />
    <title>Offline - Daily Bread</title>
    <style>
        /* Static Ultraviolet-dark values (design #19c) — tokens may not be cached offline. */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0D0A14;
            color: #F1EDF9;
        }

        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px;
            text-align: center;
        }

        .offline-card {
            width: 100%;
            max-width: 360px;
            border-radius: 16px;
            background: #12101E;
            border: 1px solid #251C38;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Amber-gold splash loaf per the brand-mark spec */
        .offline-loaf {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-size: 16px;
            font-weight: 700;
            color: #F1EDF9;
            margin-top: 12px;
        }

        p {
            font-size: 12px;
            line-height: 1.5;
            color: #A79FC0;
            margin-top: 5px;
            max-width: 240px;
        }

        .retry-btn {
            margin-top: 14px;
            padding: 9px 20px;
            border-radius: 11px;
            background: #8B5CF6;
            color: #fff;
            border: none;
            font-family: inherit;
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s, box-shadow 0.2s;
        }

        .retry-btn:hover {
            filter: brightness(1.08);
            box-shadow: 0 0 18px -4px rgba(139, 92, 246, 0.65);
        }

        .retry-btn:active {
            filter: brightness(0.95);
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 7px;
            color: #6F6690;
            font-size: 11px;
            margin-top: 22px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: #F472B6;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (prefers-reduced-motion: reduce) {
            .offline-loaf,
            .status-dot {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <svg class="offline-loaf" width="40" height="40" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 13a8 8 0 0 1 16 0v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" fill="#FBBF24"></path>
                <path d="m8.2 12.2 2.8-3.4M12.8 13.6l2.8-3.4" stroke="#12101E" stroke-width="1.6" stroke-linecap="round" fill="none"></path>
            </svg>
            <h1>You're offline</h1>
            <p>Daily Bread needs a connection. It'll pick right back up when you're online.</p>
            <button class="retry-btn" onclick="window.location.reload()">Try again</button>
        </div>
        <div class="status-text">
            <div class="status-dot"></div>
            <span>Waiting for connection&hellip;</span>
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
